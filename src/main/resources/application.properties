# Kafka Configuration
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Incoming channel configuration (Consumer)
mp.messaging.incoming.account-events-in.connector=smallrye-kafka
mp.messaging.incoming.account-events-in.topic=account-events
mp.messaging.incoming.account-events-in.group.id=account-service
mp.messaging.incoming.account-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.account-events-in.auto.offset.reset=earliest
mp.messaging.incoming.account-events-in.enable.auto.commit=true
mp.messaging.incoming.account-events-in.auto.commit.interval.ms=1000

# Outgoing channel configuration (Producer)
mp.messaging.outgoing.account-events-out.connector=smallrye-kafka
mp.messaging.outgoing.account-events-out.topic=account-events
mp.messaging.outgoing.account-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.account-events-out.acks=all
mp.messaging.outgoing.account-events-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer

